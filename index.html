<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語学習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            font-size: 24px; /* 全体的に文字を大きく */
        }
        h1, h2 { color: #2c3e50; }
        h1 { font-size: 42px; margin-bottom: 30px; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-height: 300px;
        }
        button {
            font-size: 24px;
            padding: 15px 30px;
            margin: 12px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        input[type="text"] {
            font-size: 28px;
            padding: 12px;
            width: 80%;
            max-width: 500px;
            margin-top: 20px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        .info { font-size: 20px; color: #7f8c8d; margin-top: 15px; }
        .correct { color: #2ecc71; font-weight: bold; }
        .incorrect { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body onclick="focusInput()">

<div class="container">
    <div id="app">
        </div>
</div>

<script>
// --- データ定義 ---
const dataset = {
    "現国": {
        "漢字": [
            ["昇華", "より高度な状態に高められること"], ["寡黙","ほとんど物を言わないさま"], ["薫陶","人徳によって影響を与え、よい方に導くこと"], ["意匠","物を作る上での工夫"], ["拒否","聞き入れることなくはねつけること"], ["自負","じぶんの能力などにじ信を持つこと"], ["制御","思うように操ること"], ["偏狭","自分だけのせまい考えにとらわれるさま"], ["倒錯","社会的規範に反し異常であること"], ["狭義","せまい方の意味"], ["卑近","手ぢかでありふれているさま"], ["虚構","想像力によって本当のことであるかのように組みたてること"], ["位相","変化するものが特定の場面でとる姿"], ["逸話","世間にあまり知られていないはなし"], ["前提","基礎となる判断・物事をなす土台"], ["情緒","人に感慨をもよおさせる独特の味わい"], ["濃厚","こいさま"], ["駆動","ちからを伝えてうごかすこと"]
        ],
        "語彙ノート、キーワード": [
            ["複数の人が同じようなことを言う", "口をそろえる"], ["思いがけず自然と次から次へと言葉が出る", "口を突いて出る"], ["①どっしりと構え、物事に取り組む ②一所に落ち着く", "腰を据える"], ["ある物事に見込みがないと諦めて手を引く", "さじを投げる"], ["苦労する。努力を要する。困難である", "骨が折れる"], ["素晴らしいものに接して、深く感動・共鳴する", "琴線に触れる"], ["反響をもたらすような問題や意見を投げかける", "一石を投じる"], ["物事の核心をつく。的確に要点をつかむ", "的に射る"], ["〜についてはともかく。〜は別として", "いざ知らず"], ["だまされないように用心する", "眉に唾をつける"], ["自分の考えややり方などにこだわって、まったく変えようとしないこと", "かたくな"], ["状況や表情などの既知の情報から、ほかのことが推測できる", "察しがつく"], ["心の中に思い浮かべる姿や情景", "イメージ"], ["実際と同じような状態をつくり出して実験・研究を行うこと", "シミュレーション"], ["（自らの意志で）精一杯努力する、一生懸命働く", "精を出す"], ["厳しく育てられて成長する", "培われる"], ["あらかじめ出来上がっていること", "出来合い"], ["①きまりが悪い。何となく恥ずかしい ②運が悪い。巡り合わせ・時間が悪い", "間が悪い"], ["（うそや冗談を）言葉どおりに受け取る。本気にする", "真に受ける"], ["劣ったものとして扱う。ばかにする。見見下す", "おとしめる"], ["同じ性質を持つ物事が含まれる範囲", "カテゴリー"], ["体系や秩序。系統立った組織。方式", "システム"], ["連続的な量を区切って、数字で表示すること", "デジタル"], ["（損害・被害を受ける）危険性。危険", "リスク"], ["一つの面や表現が多くの意味を持っているさま", "多義的"], ["①わけ。理由。事情 ②古くからの言い伝え。由緒。由来。来歴", "いわれ"], ["表現があからさまで、含みや味わいがない", "身も蓋もない"], ["実際にはできないが、その気持ちはとても強くある様子", "〜はやまやまだか"], ["うまいことを言って人をだます", "たぶらかす"], ["急に熱を出したり、ぶつけたりするさま", "はたと"], ["間に置く。間に入れる", "介する"], ["すぐ始められるように、また物事がうまく運ぶように、準備を整えること", "お膳立て"], ["①自負。自己意識 ②（エゴイズムの意味で）自分だけよければよいとする考え方。利己主義", "エゴ"], ["気持ちや意見を互いに伝達し合うこと。相互伝達", "コミュニケーション"], ["①抑圧され無意識に形成されるゆがんだ感情 ②劣等感", "コンプレックス"], ["否定的人。消極的", "ネガティブ"], ["他人に対して思いやりや愛想がない様子", "そっけない"], ["どちらかというと。いつも", "むしろ"], ["大勢の人が寄り集まって", "寄ってたかって"], ["今となっては", "もはや"], ["ある動作や行動などに対する結果や反応を見て、軌道修正や調整をすること", "フィードバック"], ["まるで。ちょうど（後に「〜ようだ・〜ごとく」を伴うことが多い）", "あたかも"], ["いいも悪いもかまわず。無理やりに", "いやおうなしに"], ["たとえば言えば。言ってみれば", "言わば"], ["それ以上のものではない。ただ〜なだけだ", "〜にすぎない"], ["ある限りの。考えられる限りの。全て", "ありとあらゆる"], ["少しも。全然", "夢にも"], ["そのことだけに精神を集中する様子。ただただ", "ひたすら"], ["経過。経過。手続き。手順", "プロセス"], ["①やりにくいことを押し切って実行する様子 ②別に。特に。わざわざ（後に打消語を伴う）", "あえて"], ["二番目。一番大事なことではないこと", "二の次"], ["意見の一致。合意。同意", "コンセンサス"], ["動機付け。実行する意欲を起こさせるきっかけ。やる気", "モチベーション"], ["疑いようのないほど確かな様子。由緒正しい", "れっきとした"], ["感覚によってものごとを感じ取る能力。感覚。あるいは『感じる能力（性）』。", "感性"], ["①ものごとの根本を探求する能力。②合理的に考え判断する能力。あるいは『理の能力（性）』。", "理性"], ["思考能力。あるいは『悟る（わかる）能力（性）』。", "悟性"], ["①自分という意識。②自分という意識をもった存在。あるいは『自分の我』。", "自我"], ["①他者がもつ自分という意識。②自分という意識をもった他者。あるいは『他人の我』。", "他我"], ["自分。", "自己"], ["自分以外の存在。", "他者"], ["他から切り離されている一人の人間。", "個人、個"], ["かかわりあっている二人以上の人間。", "社会"], ["他者とのかかわりの中で自分を実感すること。自己同一性。", "アイデンティティ、自己同一性"], ["①制約や束縛からの解放。②自分の思ったとおりにできること。", "自由"], ["一つの国民によって構成される国家。", "国民国家"], ["文化を共有する（と考えられている）集団。国民。", "民族"], ["民衆を政治の中心とする立場。", "民主主義、デモクラシー"], ["資本をもとに利潤を追求する経済体制。", "資本主義"], ["民族主義。国家主義。", "ナショナリズム"], ["世界化。", "グローバラリゼーション"], ["根本に戻って考えようとする立場。", "原理主義"], ["すべての文化が同じ価値をもつと考える立場。", "文化相対主義、多文化主義"], ["さまざまな文化が互いにまじりあい、変化し続けているという目線・とらえ方。", "ピジン・クレオール説"], ["世界を区切り、認識すること。", "分節"], ["意味をもつもの。", "記号"], ["ものごとの意味内容。", "概念"], ["つくりごと。", "虚構、フィクション"], ["人々に共有され、何かを成り立たせる話。", "物語"]]
    },
    "英コミュ": {}, "古典": {}, "論表": {} // 拡張用
};

let currentList = [];
let mode = "";
let resultMessage = "";

const app = document.getElementById("app");

// どこをクリックしても入力欄にフォーカスを当てる関数
function focusInput() {
    const input = document.getElementById("answerInput");
    if (input) input.focus();
}

// 配列をシャッフル
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 初期画面: カテゴリー選択
function showCategories() {
    let html = `<h2>カテゴリー</h2>`;
    ["英コミュ", "現国", "古典", "論表"].forEach(cat => {
        html += `<button onclick="showSubCategories('${cat}')">${cat}</button>`;
    });
    app.innerHTML = html;
}

// サブカテゴリー（名前）選択
function showSubCategories(cat) {
    const subs = dataset[cat];
    if (!subs || Object.keys(subs).length === 0) {
        app.innerHTML = `<h2>データがありません</h2><button onclick="showCategories()">戻る</button>`;
        return;
    }
    let html = `<h2>${cat} の中身を選択</h2>`;
    Object.keys(subs).forEach(sub => {
        html += `<button onclick="selectMode('${cat}', '${sub}')">${sub}</button>`;
    });
    html += `<br><button onclick="showCategories()">戻る</button>`;
    app.innerHTML = html;
}

// モード選択画面
function selectMode(cat, sub) {
    let html = `<h2>モードを選択してください</h2>`;
    html += `<button onclick="startQuiz('${cat}', '${sub}', 'miss3')">誤は3つ後にするもの</button><br>`;
    html += `<button onclick="startQuiz('${cat}', '${sub}', 'both')">前後両方</button><br>`;
    html += `<button onclick="startQuiz('${cat}', '${sub}', 'typing_repeat')">繰り返しタイピング</button><br>`;
    html += `<button onclick="startQuiz('${cat}', '${sub}', 'typing')">タイピング</button><br>`;
    html += `<button onclick="showSubCategories('${cat}')">戻る</button>`;
    app.innerHTML = html;
}

// クイズデータの初期化と開始
function startQuiz(cat, sub, selectedMode) {
    let baseList = JSON.parse(JSON.stringify(dataset[cat][sub])); // ディープコピー
    mode = selectedMode;
    resultMessage = "";

    if (mode === 'both') {
        let doubleList = [];
        baseList.forEach(item => {
            doubleList.push([item[0], item[1]]);
            doubleList.push([item[1], item[0]]);
        });
        currentList = shuffle(doubleList);
    } else {
        currentList = shuffle(baseList);
    }
    nextQuestion();
}

// 次の問題を表示
function nextQuestion() {
    if (currentList.length === 0) {
        app.innerHTML = `<h2>達成！お疲れ様でした。</h2><button onclick="showCategories()">最初に戻る</button>`;
        return;
    }

    const current = currentList[0];
    let html = `<div>${resultMessage}</div>`;

    if (mode === 'typing' || mode === 'typing_repeat') {
        // タイピング系の画面（問題と答えを両方最初から表示）
        html += `<h2>【タイピング】</h2>`;
        html += `<p style="font-size: 32px; font-weight: bold; margin: 10px 0;">${current[0]}</p>`;
        html += `<p style="color: #16a085; font-size: 26px;">お手本: ${current[1]}</p>`;
    } else {
        // 通常のクイズ画面
        html += `<h2>問題: ${current[0]}</h2>`;
    }

    html += `<input type="text" id="answerInput" placeholder="答えを入力..." autocomplete="off"><br>`;
    html += `<p class="info">※何も入力せずにエンターを押すとパス/次の問題へ</p>`;
    html += `<p class="info">残り: ${currentList.length} 問</p>`;
    html += `<button onclick="checkAnswer()">決定</button> `;
    html += `<button onclick="showCategories()" style="background-color: #e74c3c;">中断する</button>`;

    app.innerHTML = html;
    
    // 入力欄にフォーカスを当て、エンターキーのイベントを設定
    const input = document.getElementById("answerInput");
    input.focus();
    input.addEventListener("keypress", function(e) {
        if (e.key === 'Enter') checkAnswer();
    });
}

// 回答チェックのコアロジック
function checkAnswer() {
    const input = document.getElementById("answerInput");
    const userAnswer = input.value.trim();
    const current = currentList[0];

    // Pythonコード再現: 空欄の場合はスキップ（あるいはコンソール状態リセットのようにパス）
    if (userAnswer === "") {
        resultMessage = `<p class="info">パスしました（正解: ${current[1]}）</p>`;
        // リストの先頭を最後尾に回して次へ
        currentList.push(currentList.shift());
        nextQuestion();
        return;
    }

    const isCorrect = userAnswer.toLowerCase() === current[1].toLowerCase();

    if (isCorrect) {
        resultMessage = `<p class="correct">〇 正解！</p>`;
        currentList.shift(); // 正解なのでリストから削除
    } else {
        resultMessage = `<p class="incorrect">× 不正解！（正解: ${current[1]}）</p>`;
        
        if (mode === 'miss3' || mode === 'both' || mode === 'typing_repeat') {
            // 3個あとに送る（配列のインデックス3の位置、つまり4番目に挿入。残りが少なければ最後尾）
            currentList.shift();
            const insertIndex = Math.min(3, currentList.length);
            currentList.splice(insertIndex, 0, current);
        } else if (mode === 'typing') {
            // 間違っても3個あとに送らない（そのままリストから消さずにその場でやり直し、または後ろへ回す等。ここではPythonベースで先頭を維持して再挑戦、あるいはパスと同じ扱いにするため、今回は消さずにそのまま次に進める仕様にします）
            currentList.push(currentList.shift());
        }
    }
    nextQuestion();
}

// 起動
showCategories();
</script>

</body>
</html>
