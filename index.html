<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語学習アプリ</title>
    <style>
        /* 背景と全体のデザイン調整（見やすく大きく） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1, h2 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        /* ボタンのデザイン（大きく、押しやすく） */
        button {
            font-size: 1.5rem;
            padding: 15px 35px;
            margin: 12px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        /* テキスト表示と入力欄 */
        .quiz-text {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .hint-text {
            font-size: 1.6rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .result-text {
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
            min-height: 2.5rem;
        }
        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; }
        
        input[type="text"] {
            font-size: 2rem;
            padding: 12px;
            width: 80%;
            max-width: 500px;
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    </div>

<script>
// --- データ定義 ---
const dataStore = {
    "現国": {
        "漢字": [
            ["昇華", "より高度な状態に高められること"], ["寡黙","ほとんど物を言わないさま"], ["薫陶","人徳によって影響を与え、よい方に導くこと"], ["意匠","物を作る上での工夫"], ["拒否","聞き入れることなくはねつけること"], ["自負","じぶんの能力などにじ信を持つこと"], ["制御","思うように操ること"], ["偏狭","自分だけのせまい考えにとらわれるさま"], ["倒錯","社会的規範に反し異常であること"], ["狭義","せまい方の意味"], ["卑近","手ぢかでありふれているさま"], ["虚構","想像力によって本当のことであるかのように組みたてること"], ["位相","変化するものが特定の場面でとる姿"], ["逸話","世間にあまり知られていないはなし"], ["前提","基礎となる判断・物事をなす土台"], ["情緒","人に感慨をもよおさせる独特の味わい"], ["濃厚","こいさま"], ["駆動","ちからを伝えてうごかすこと"]
        ],
        "語彙ノート、キーワード": [
            ["複数の人が同じようなことを言う", "口をそろえる"], ["思いがけず自然と次から次へと言葉が出る", "口を突いて出る"], ["①どっしりと構え、物事に取り組む ②一所に落ち着く", "腰を据える"], ["ある物事に見込みがないと諦めて手を引く", "さじを投げる"], ["苦労する。努力を要する。困難である", "骨が折れる"], ["素晴らしいものに接して、深く感動・共鳴する", "琴線に触れる"], ["反響をもたらすような問題や意見を投げかける", "一石を投じる"], ["物事の核心をつく。的確に要点をつかむ", "的に射る"], ["〜についてはともかく。〜は別として", "いざ知らず"], ["だまされないように用心する", "眉に唾をつける"], ["自分の考えややり方などにこだわって、まったく変えようとしないこと", "かたくな"], ["状況や表情などの既知の情報から、ほかのことが推測できる", "察しがつく"], ["心の中に思い浮かべる姿や情景", "イメージ"], ["実際と同じような状態をつくり出して実験・研究を行うこと", "シミュレーション"], ["（自らの意志で）精一杯努力する、一生懸命働く", "精を出す"], ["厳しく育てられて成長する", "培われる"], ["あらかじめ出来上がっていること", "出来合い"], ["①きまりが悪い。何となく恥ずかしい ②運が悪い。巡り合わせ・時間が悪い", "間が悪い"], ["（うそや冗談を）言葉どおりに受け取る。本気にする", "真に受ける"], ["劣ったものとして扱う。ばかにする。見見下す", "おとしめる"], ["同じ性質を持つ物事が含まれる範囲", "カテゴリー"], ["体系や秩序。系統立った組織。方式", "システム"], ["連続的な量を区切って、数字で表示すること", "デジタル"], ["（損害・被害を受ける）危険性。危険", "リスク"], ["一つの面や表現が多くの意味を持っているさま", "多義的"], ["①わけ。理由。事情 ②古くからの言い伝え。由緒。由来。来歴", "いわれ"], ["表現があからさまで、含みや味わいがない", "身も蓋もない"], ["実際にはできないが、その気持ちはとても強くある様子", "〜はやまやまだか"], ["うまいことを言って人をだます", "たぶらかす"], ["急に熱を出したり、ぶつけたりするさま", "はたと"], ["間に置く。間に入れる", "介する"], ["すぐ始められるように、また物事がうまく運ぶように、準備を整えること", "お膳立て"], ["①自負。自己意識 ②（エゴイズムの意味で）自分だけよければよいとする考え方。利己主義", "エゴ"], ["気持ちや意見を互いに伝達し合うこと。相互伝達", "コミュニケーション"], ["①抑圧され無意識に形成されるゆがんだ感情 ②劣等感", "コンプレックス"], ["否定的人。消極的", "ネガティブ"], ["他人に対して思いやりや愛想がない様子", "そっけない"], ["どちらかというと。いつも", "むしろ"], ["大勢の人が寄り集まって", "寄ってたかって"], ["今となっては", "もはや"], ["ある動作や行動などに対する結果や反応を見て、軌道修正や調整をすること", "フィードバック"], ["まるで。ちょうど（後に「〜ようだ・〜ごとく」を伴うことが多い）", "あたかも"], ["いいも悪いもかまわず。無理やりに", "いやおうなしに"], ["たとえば言えば。言ってみれば", "言わば"], ["それ以上のものではない。ただ〜なだけだ", "〜にすぎない"], ["ある限りの。考えられる限りの。全て", "ありとあらゆる"], ["少しも。全然", "夢にも"], ["そのことだけに精神を集中する様子。ただただ", "ひたすら"], ["経過。経過。手続き。手順", "プロセス"], ["①やりにくいことを押し切って実行する様子 ②別に。特に。わざわざ（後に打消語を伴う）", "あえて"], ["二番目。一番大事なことではないこと", "二の次"], ["意見の一致。合意。同意", "コンセンサス"], ["動機付け。実行する意欲を起こさせるきっかけ。やる気", "モチベーション"], ["疑いようのないほど確かな様子。由緒正しい", "れっきとした"], ["感覚によってものごとを感じ取る能力。感覚。あるいは『感じる能力（性）』。", "感性"], ["①ものごとの根本を探求する能力。②合理的に考え判断する能力。あるいは『理の能力（性）』。", "理性"], ["思考能力。あるいは『悟る（わかる）能力（性）』。", "悟性"], ["①自分という意識。②自分という意識をもった存在。あるいは『自分の我』。", "自我"], ["①他者がもつ自分という意識。②自分という意識をもった他者。あるいは『他人の我』。", "他我"], ["自分。", "自己"], ["自分以外の存在。", "他者"], ["他から切り離されている一人の人間。", "個人、個"], ["かかわりあっている二人以上の人間。", "社会"], ["他者とのかかわりの中で自分を実感すること。自己同一性。", "アイデンティティ、自己同一性"], ["①制約や束縛からの解放。②自分の思ったとおりにできること。", "自由"], ["一つの国民によって構成される国家。", "国民国家"], ["文化を共有する（と考えられている）集団。国民。", "民族"], ["民衆を政治の中心とする立場。", "民主主義、デモクラシー"], ["資本をもとに利潤を追求する経済体制。", "資本主義"], ["民族主義。国家主義。", "ナショナリズム"], ["世界化。", "グローバライゼーション"], ["根本に戻って考えようとする立場。", "原理主義"], ["すべての文化が同じ価値をもつと考える立場。", "文化相対主義、多文化主義"], ["さまざまな文化が互いにまじりあい、変化し続けているという目線・とらえ方。", "ピジン・クレオール説"], ["世界を区切り、認識すること。", "分節"], ["意味をもつもの。", "記号"], ["ものごとの意味内容。", "概念"], ["つくりごと。", "虚構、フィクション"], ["人々に共有され、何かを成り立たせる話。", "物語"]]
        ]
    },
    "英コミュ": {}, "古典": {}, "論表": {} // 必要に応じて追加可能
};

// アプリの進行状態を管理する変数
let currentCategory = "";
let currentSubCategory = "";
let currentMode = ""; // 'miss3', 'both', 'typing', 'simple_typing'
let activeWords = [];
let isShowingAnswer = false; // 回答提示フラグ（空欄Enter対策）

const app = document.getElementById('app');

// 配列をシャッフルする関数
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 最初の画面：カテゴリー選択
function showCategories() {
    app.innerHTML = `<h1>カテゴリー</h1>`;
    ["英コミュ", "現国", "古典", "論表"].forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        btn.onclick = () => selectCategory(cat);
        app.appendChild(btn);
    });
}

// カテゴリー選択後の処理
function selectCategory(cat) {
    currentCategory = cat;
    const subCats = dataStore[cat] ? Object.keys(dataStore[cat]) : [];
    
    if (subCats.length === 0) {
        alert("このカテゴリーにはまだデータがありません。");
        return;
    }
    
    app.innerHTML = `<h1>${cat}</h1>`;
    subCats.forEach(sub => {
        const btn = document.createElement('button');
        btn.innerText = sub;
        btn.onclick = () => selectSubCategory(sub);
        app.appendChild(btn);
    });
    addBackButton(showCategories);
}

// サブカテゴリー選択後の処理（モード選択）
function selectSubCategory(sub) {
    currentSubCategory = sub;
    app.innerHTML = `<h1>${sub}</h1>`;
    
    const modes = [
        { name: "誤は3つ後にするもの", id: "miss3" },
        { name: "前後両方", id: "both" },
        { name: "繰り返しタイピング", id: "typing" },
        { name: "タイピング", id: "simple_typing" }
    ];
    
    modes.forEach(m => {
        const btn = document.createElement('button');
        btn.innerText = m.name;
        btn.onclick = () => startMode(m.id);
        app.appendChild(btn);
    });
    addBackButton(() => selectCategory(currentCategory));
}

// 学習モードの初期化と開始
function startMode(mode) {
    currentMode = mode;
    let baseWords = JSON.parse(JSON.stringify(dataStore[currentCategory][currentSubCategory]));
    
    if (mode === 'both') {
        // 前後両方の場合は、a1->a2 と a2->a1 の両方を追加
        let bothWords = [];
        baseWords.forEach(w => {
            bothWords.push([w[0], w[1]]);
            bothWords.push([w[1], w[0]]);
        });
        activeWords = shuffle(bothWords);
    } else {
        activeWords = shuffle(baseWords);
    }
    
    isShowingAnswer = false;
    nextQuestion();
}

// 次の問題を出力
function nextQuestion() {
    if (activeWords.length === 0) {
        app.innerHTML = `<h1>達成！</h1>`;
        const btn = document.createElement('button');
        btn.innerText = "タイトルに戻る";
        btn.onclick = showCategories;
        app.appendChild(btn);
        return;
    }

    const current = activeWords[0];
    isShowingAnswer = false;

    // モードごとの画面生成
    if (currentMode === 'miss3' || currentMode === 'both') {
        app.innerHTML = `
            <div class="quiz-text">問題: ${current[0]}</div>
            <input type="text" id="ansInput" placeholder="答えを入力（空欄Enterで確認）" autocomplete="off">
            <div id="result" class="result-text"></div>
            <button id="submitBtn">決定</button>
        `;
        
        const input = document.getElementById('ansInput');
        const submitBtn = document.getElementById('submitBtn');
        
        // フォーカスを自動で合わせる
        input.focus();
        
        // Enterキーおよびボタンクリックのイベント
        input.onkeydown = (e) => { if (e.key === 'Enter') handleMiss3Both(current); };
        submitBtn.onclick = () => handleMiss3Both(current);

    } else if (currentMode === 'typing' || currentMode === 'simple_typing') {
        // タイピングモード（問題と答えを同時に見せながら打たせる）
        app.innerHTML = `
            <div class="quiz-text">問題: ${current[0]}</div>
            <div class="hint-text">打つ文字: <strong>${current[1]}</strong></div>
            <input type="text" id="ansInput" placeholder="上記をタイピング" autocomplete="off">
            <div id="result" class="result-text"></div>
            <button id="submitBtn">次へ</button>
        `;
        
        const input = document.getElementById('ansInput');
        const submitBtn = document.getElementById('submitBtn');
        input.focus();
        
        input.onkeydown = (e) => { if (e.key === 'Enter') handleTyping(current); };
        submitBtn.onclick = () => handleTyping(current);
    }
}

// 【誤は3つ後・前後両方】の判定処理
function handleMiss3Both(current) {
    const input = document.getElementById('ansInput');
    const resultDiv = document.getElementById('result');
    const answer = input.value.trim();

    // 1回目：答えが未入力、またはまだ答えを見せていない状態での処理
    if (!isShowingAnswer) {
        if (answer === "") {
            // 空欄エンター：答えを提示して次のEnterを待つ
            resultDiv.innerHTML = `<span class="incorrect">正解: ${current[1]}</span>`;
            isShowingAnswer = true;
            input.placeholder = "Enterキーで次へ";
            return;
        }
        
        // 正誤判定
        if (answer.toLowerCase() === current[1].toLowerCase()) {
            resultDiv.innerHTML = `<span class="correct">正解！</span>`;
            activeWords.shift(); // 先頭を削除
        } else {
            resultDiv.innerHTML = `<span class="incorrect">不正解！（正解: ${current[1]}）</span>`;
            // 間違えたので3つ後ろ（インデックス3の位置）に挿入
            const wrongWord = activeWords.shift();
            activeWords.splice(3, 0, wrongWord);
        }
        isShowingAnswer = true;
        input.placeholder = "Enterキーで次へ";
    } else {
        // 2回目：答えが見えている状態でのEnter入力 -> 次の問題へ
        nextQuestion();
    }
}

// 【繰り返しタイピング・タイピング】の判定処理
function handleTyping(current) {
    const input = document.getElementById('ansInput');
    const resultDiv = document.getElementById('result');
    const answer = input.value.trim();

    if (!isShowingAnswer) {
        if (answer.toLowerCase() === current[1].toLowerCase()) {
            resultDiv.innerHTML = `<span class="correct">OK!</span>`;
            activeWords.shift();
            isShowingAnswer = true;
            // タイピング成功時はスムーズに次へ進むために少しだけ待つか、再Enterで進む
            setTimeout(nextQuestion, 400); 
        } else {
            resultDiv.innerHTML = `<span class="incorrect">文字が違います。もう一度打ってください。</span>`;
            
            // 繰り返しタイピング(typing)の場合は間違えたら3つ後へ送る
            if (currentMode === 'typing') {
                const wrongWord = activeWords.shift();
                activeWords.splice(3, 0, wrongWord);
                isShowingAnswer = true;
                input.value = "";
                input.placeholder = "Enterキーで次へ";
            } else {
                // 通常タイピング(simple_typing)は間違えても後ろに送らず次へ
                activeWords.shift();
                isShowingAnswer = true;
                input.placeholder = "Enterキーで次へ";
            }
        }
    } else {
        nextQuestion();
    }
}

// 戻るボタンを設置する共通ヘルパー
function addBackButton(callback) {
    const br = document.createElement('br');
    const backBtn = document.createElement('button');
    backBtn.innerText = "戻る";
    backBtn.style.backgroundColor = "#95a5a6";
    backBtn.onclick = callback;
    app.appendChild(br);
    app.appendChild(backBtn);
}

// 起動時に最初の画面を表示
showCategories();
</script>

</body>
</html>
