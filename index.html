<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語学習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h2 { color: #4a5568; margin-bottom: 20px; }
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
        button:hover { background-color: #4338ca; }
        button.back-btn { background-color: #718096; margin-top: 15px; }
        button.back-btn:hover { background-color: #4a5568; }
        input[type="text"] {
            width: calc(100% - 24px);
            padding: 12px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #4f46e5; }
        .info { font-size: 14px; color: #718096; margin-top: 5px; }
        .result { font-weight: bold; font-size: 18px; margin: 15px 0; }
        .correct { color: #10b981; }
        .incorrect { color: #ef4444; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-category">
        <h2>カテゴリー</h2>
        <div class="btn-grid">
            <button onclick="selectCategory('英コミュ')">英コミュ</button>
            <button onclick="selectCategory('現国')">現国</button>
            <button onclick="selectCategory('古典')">古典</button>
            <button onclick="selectCategory('論表')">論表</button>
        </div>
    </div>

    <div id="screen-mode" class="hidden">
        <h2 id="mode-title">教科名</h2>
        <div class="btn-grid">
            <button onclick="selectMode('miss3')">誤は3つ後にするもの</button>
            <button onclick="selectMode('both')">前後両方</button>
            <button onclick="selectMode('typing')">タイピング</button>
            <button class="back-btn" onclick="showScreen('category')">戻る</button>
        </div>
    </div>

        <h2 id="quiz-progress">残り: 0問</h2>
        <div id="question-box
